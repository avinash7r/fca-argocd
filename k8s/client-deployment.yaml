apiVersion: apps/v1
kind: Deployment
metadata:
  name: fca-client-deployment
spec:
  selector:
    matchLabels:
      app: fca-client
  template:
    metadata:
      labels:
        app: fca-client
    spec:
      containers:
      - name: fca-client
        image: avinashrajure/fca-client:498c6d5cae0b8b8f30bfedef5d9fe7065fd94b20
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: client-config-map

---

apiVersion: v1
kind: Service
metadata:
  name: fca-client-service
spec:
  type: NodePort
  selector:
    app: fca-client
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30001